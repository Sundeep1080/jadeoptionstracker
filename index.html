<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>⚡ JADE SUPREMA v16</title>
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07090d;--bg2:#0c111a;--bg3:#111922;--bg4:#18232e;
  --b1:#1a2a38;--b2:#243648;--b3:#2e4259;
  --txt:#9ab8cc;--dim:#3d5568;--hi:#f0c040;--hi2:#c08820;
  --bull:#22d46e;--bull2:#0b4a28;--bear:#f04060;--bear2:#5a1828;
  --blue:#2d9cdb;--blue2:#103a55;--cyan:#18c9a8;--cyan2:#064038;
  --warn:#e8922a;--purp:#9455c8;--r:4px;
  --hdr:44px;--cfg:48px;--nav:36px;--ref:34px;--sb:26px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--txt);font-family:'JetBrains Mono',monospace;font-size:11px;display:flex;flex-direction:column}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}

/* ══ AUTH ═══════════════════════════════════════════════════════ */
#authWrap{
  position:fixed;inset:0;z-index:9999;
  background:radial-gradient(ellipse at 25% 35%,#0c1c2c,#04080e 70%);
  display:flex;align-items:center;justify-content:center;padding:16px;overflow-y:auto;
}
.abox{
  width:100%;max-width:480px;
  background:linear-gradient(145deg,#0c1520,#070b10);
  border:1px solid var(--b2);border-radius:10px;padding:24px;
  position:relative;overflow:hidden;
}
.abox::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent 0%,var(--hi) 50%,transparent 100%)}
.atitle{font-family:'Orbitron',monospace;font-size:20px;font-weight:900;
  color:var(--hi);text-align:center;letter-spacing:4px;margin-bottom:3px}
.asub{text-align:center;color:var(--dim);font-size:9px;letter-spacing:2px;margin-bottom:22px}
.step-hdr{
  display:flex;align-items:center;gap:8px;margin-bottom:10px;
  font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--dim);
}
.step-num{
  width:18px;height:18px;border-radius:50%;
  background:var(--blue2);border:1px solid var(--blue);
  color:var(--blue);font-size:9px;font-weight:700;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.frow{margin-bottom:12px}
.frow label{display:block;color:var(--dim);font-size:8.5px;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.finp{
  width:100%;background:var(--bg);border:1px solid var(--b2);
  color:var(--txt);padding:8px 10px;border-radius:var(--r);
  font-family:'JetBrains Mono',monospace;font-size:11px;transition:border-color .2s;
}
.finp:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 2px rgba(45,156,219,.12)}
.abtn{
  width:100%;padding:10px;font-family:'Orbitron',monospace;font-size:11px;
  font-weight:700;letter-spacing:2px;border:none;border-radius:var(--r);
  cursor:pointer;transition:all .18s;margin-top:4px;
}
.abtn-gold{background:linear-gradient(135deg,var(--hi),var(--hi2));color:#07090d}
.abtn-blue{background:var(--blue2);border:1px solid var(--blue);color:#c0dcf0;margin-top:8px}
.abtn-green{background:var(--bull2);border:1px solid var(--bull);color:#a0f0c0;margin-top:8px}
.abtn:hover{filter:brightness(1.1);transform:translateY(-1px)}
.abtn:active{transform:translateY(0)}
.adiv{border-top:1px solid var(--b1);margin:16px 0 12px;padding-top:12px}
.amsg{min-height:18px;font-size:10px;text-align:center;margin-top:8px;padding:4px}
.amsg.ok{color:var(--bull)}.amsg.err{color:var(--bear)}.amsg.inf{color:var(--warn)}
.token-box{
  background:var(--bg);border:1px solid var(--bull2);border-radius:var(--r);
  padding:8px 10px;font-size:11px;color:var(--bull);word-break:break-all;
  margin-top:8px;display:none;cursor:pointer;
}
.saved-badge{
  display:none;background:rgba(34,212,110,.1);border:1px solid var(--bull);
  border-radius:var(--r);padding:4px 10px;font-size:9px;color:var(--bull);
  text-align:center;margin-bottom:10px;
}

/* ══ MAIN LAYOUT ════════════════════════════════════════════════ */
#mainApp{display:none;flex-direction:column;height:100%;overflow:hidden}

/* ── Header ─────────────────────────────────────────── */
.hdr{
  height:var(--hdr);flex-shrink:0;
  background:linear-gradient(90deg,#04080f,#07111e);
  border-bottom:1px solid var(--b1);
  display:flex;align-items:center;padding:0 12px;gap:12px;
}
.htitle{font-family:'Orbitron',monospace;font-size:14px;font-weight:900;
  color:var(--hi);letter-spacing:3px;flex-shrink:0}
.hmetrics{display:flex;gap:14px;align-items:center;flex:1;justify-content:flex-end;flex-wrap:wrap}
.hmet{display:flex;flex-direction:column;align-items:center;min-width:40px}
.hmet .v{font-size:13px;font-weight:700;color:var(--txt);font-family:'Orbitron',monospace}
.hmet .l{font-size:7px;color:var(--dim);letter-spacing:1px;text-transform:uppercase}
.gate-ok{color:var(--bull)!important}.gate-no{color:var(--bear)!important}
.hbtn{padding:4px 8px;font-size:9px;border-radius:var(--r);border:1px solid var(--b2);
  background:var(--bg3);color:var(--dim);cursor:pointer;font-family:'JetBrains Mono',monospace}
.hbtn:hover{color:var(--txt);border-color:var(--b3)}

/* ── Config ──────────────────────────────────────────── */
.cfg{
  height:var(--cfg);flex-shrink:0;
  background:var(--bg2);border-bottom:1px solid var(--b1);
  display:flex;align-items:center;padding:0 10px;gap:8px;overflow-x:auto;
}
.cfg::-webkit-scrollbar{height:0}
.cg{display:flex;flex-direction:column;gap:2px;flex-shrink:0}
.cg label{color:var(--dim);font-size:7.5px;letter-spacing:.5px;text-transform:uppercase}
.cg select,.cg input{
  background:var(--bg3);border:1px solid var(--b1);color:var(--txt);
  padding:3px 6px;border-radius:var(--r);
  font-family:'JetBrains Mono',monospace;font-size:10px;
}
.cg select:focus,.cg input:focus{outline:none;border-color:var(--blue)}
.w56{width:56px}.w80{width:80px}.w100{width:100px}.w120{width:120px}
.csep{width:1px;height:28px;background:var(--b1);flex-shrink:0}
.cbtn{
  padding:4px 10px;font-size:9px;border-radius:var(--r);
  font-family:'JetBrains Mono',monospace;cursor:pointer;border:1px solid;
  flex-shrink:0;align-self:flex-end;margin-bottom:0;
}
.cbtn-g{background:var(--bull2);border-color:var(--bull);color:#b0f0c8}
.cbtn-b{background:var(--blue2);border-color:var(--blue);color:#b0d8f0}
.cbtn-d{background:var(--bg3);border-color:var(--b2);color:var(--dim)}
.cbtn:hover{filter:brightness(1.15)}

/* ── Nav ─────────────────────────────────────────────── */
.nav{
  height:var(--nav);flex-shrink:0;
  background:var(--bg2);border-bottom:1px solid var(--b1);
  display:flex;align-items:center;padding:0 8px;gap:6px;overflow-x:auto;
}
.nav::-webkit-scrollbar{height:0}
.npg{color:var(--hi);font-size:10px;font-weight:700;min-width:58px;flex-shrink:0}
.narr{padding:3px 7px;background:var(--bg3);border:1px solid var(--b2);
  color:var(--dim);border-radius:var(--r);cursor:pointer;font-size:11px;flex-shrink:0}
.narr:hover{color:var(--txt)}
.pill{
  padding:3px 9px;border-radius:10px;font-size:8px;letter-spacing:.5px;
  border:1px solid var(--b1);background:var(--bg3);color:var(--dim);
  cursor:pointer;flex-shrink:0;white-space:nowrap;
}
.pill:hover{border-color:var(--b2);color:var(--txt)}
.pill.on{background:var(--blue2);border-color:var(--blue);color:#c0dcf0}

/* ── Refresh strip ───────────────────────────────────── */
.ref{
  height:var(--ref);flex-shrink:0;
  background:var(--bg);border-bottom:1px solid var(--b1);
  display:flex;align-items:center;padding:0 10px;gap:8px;
}
.rdot{width:7px;height:7px;border-radius:50%;background:var(--dim);flex-shrink:0}
.rdot.run{background:var(--bull);animation:pulse 1.5s infinite}
.rdot.err{background:var(--bear)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.rsel{
  background:var(--bg3);border:1px solid var(--b1);color:var(--txt);
  padding:3px 6px;border-radius:var(--r);font-family:'JetBrains Mono',monospace;font-size:9px;
}
.rlabel{font-size:9px;color:var(--dim);min-width:80px}
.rnext{font-size:9px;color:var(--dim);min-width:60px}

/* ══ SPREADS GRID ═══════════════════════════════════════════════ */
#spreadsWrap{flex:1;overflow-y:auto;overflow-x:hidden;padding:8px;padding-bottom:calc(var(--sb)+8px)}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
@media(max-width:700px){.sgrid{grid-template-columns:1fr}}

/* ══ SPREAD CARD ════════════════════════════════════════════════ */
.card{
  background:var(--bg2);border:1px solid var(--b1);border-radius:6px;
  overflow:hidden;display:flex;flex-direction:column;position:relative;
}
.card::after{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.card.L0 ::after,.card.l0::after{background:var(--cyan)}
.card.l1::after{background:var(--blue)}
.card.l2::after{background:var(--warn)}
.card.l3::after{background:var(--purp)}
.card.l4::after{background:var(--bull)}
.card.tor::after{background:var(--hi)}
.card.spl::after{background:var(--bear)}

/* card top bar */
.ctop{
  background:var(--bg3);border-bottom:1px solid var(--b1);
  padding:6px 10px;display:flex;align-items:flex-start;justify-content:space-between;gap:6px;
}
.cname{font-family:'Orbitron',monospace;font-size:10px;font-weight:700;
  color:var(--hi);letter-spacing:1px}
.clegs{font-size:8.5px;margin-top:3px;line-height:1.5}
.cbadges{display:flex;gap:3px;flex-shrink:0;align-items:center;flex-wrap:wrap;justify-content:flex-end}
.bdg{display:inline-block;padding:1px 5px;border-radius:2px;
  font-size:7.5px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.bdg-cr{background:#051a0d;border:1px solid var(--bull);color:var(--bull)}
.bdg-dr{background:#200810;border:1px solid var(--bear);color:var(--bear)}
.bdg-mx{background:#1a1005;border:1px solid var(--warn);color:var(--warn)}
.bdg-lay{background:var(--bg4);border:1px solid var(--b2);color:var(--dim)}
.bdg-dte-ok{background:#051a0d;border:1px solid var(--bull);color:var(--bull)}
.bdg-dte-w{background:#1a1005;border:1px solid var(--warn);color:var(--warn)}
.bdg-dte-x{background:#1a0508;border:1px solid var(--bear);color:var(--bear)}
.cbtns{display:flex;gap:3px;align-items:center}
.dirbtn{
  padding:3px 7px;font-size:8.5px;border:1px solid var(--b2);
  background:var(--bg3);color:var(--dim);border-radius:var(--r);cursor:pointer;
  font-family:'JetBrains Mono',monospace;
}
.dirbtn.bull-on{background:var(--bull2);border-color:var(--bull);color:#b0f0c8}
.dirbtn.bear-on{background:var(--bear2);border-color:var(--bear);color:#fcc}
.cload{
  padding:3px 8px;background:#1c2c10;border:1px solid var(--hi);
  color:var(--hi);border-radius:var(--r);font-size:9px;cursor:pointer;
  font-family:'JetBrains Mono',monospace;
}
.cload:hover{background:#2a3e18}

/* 5-cell stats bar */
.sbar{display:flex;background:var(--bg);border-bottom:1px solid var(--b1)}
.sc{flex:1;padding:5px 4px;text-align:center;border-right:1px solid var(--b1)}
.sc:last-child{border-right:none}
.sv{font-family:'Orbitron',monospace;font-size:12px;font-weight:700}
.sl{font-size:7px;color:var(--dim);letter-spacing:.5px;text-transform:uppercase;margin-top:1px}
.sv.hi{color:var(--hi)}.sv.live{color:var(--cyan)}
.sv.pos{color:var(--bull)}.sv.neg{color:var(--bear)}
.sv.neu{color:var(--dim)}.sv.warn{color:var(--warn)}

/* decay legend */
.dleg{
  display:flex;align-items:center;gap:10px;padding:3px 10px;
  background:var(--bg);border-bottom:1px dashed var(--b1);font-size:8px;color:var(--dim);
  overflow-x:auto;flex-wrap:nowrap;
}
.dleg::-webkit-scrollbar{height:0}
.dli{display:flex;align-items:center;gap:4px;white-space:nowrap}
.dlw{width:12px;height:2px;border-radius:1px;flex-shrink:0}

/* chart label row */
.clbl{
  display:flex;align-items:center;gap:6px;padding:3px 10px;
  background:var(--bg3);border-bottom:1px solid var(--b1);
  font-size:8.5px;color:var(--dim);letter-spacing:.5px;text-transform:uppercase;
}
.ldot{width:6px;height:6px;border-radius:50%;background:var(--bull);
  animation:pulse 2s infinite;flex-shrink:0}
.clbl-right{margin-left:auto;display:flex;align-items:center;gap:6px}

/* chart containers */
.cbox{background:var(--bg);position:relative;overflow:hidden}
.cph{
  height:280px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;color:var(--dim);gap:8px;
}
.cph-ico{font-size:28px;opacity:.2}
.cph p{font-size:9.5px;text-align:center;line-height:1.6;max-width:200px}
.pnlbox{background:var(--bg);border-top:1px solid var(--b1)}

/* loading veil */
.veil{
  position:absolute;inset:0;background:rgba(7,9,13,.85);z-index:20;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
}
.vspin{width:22px;height:22px;border:2px solid var(--b2);
  border-top-color:var(--hi);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.vtxt{font-size:9px;color:var(--dim)}
.verr{padding:14px 16px;font-size:9.5px;color:var(--warn);text-align:center;line-height:1.7}

/* entry row */
.erow{
  display:flex;align-items:center;gap:6px;padding:4px 8px;
  background:var(--bg3);border-bottom:1px solid var(--b1);flex-wrap:wrap;
}
.einp{
  width:80px;padding:3px 6px;background:var(--bg);border:1px solid var(--b1);
  color:var(--hi);border-radius:var(--r);font-family:'JetBrains Mono',monospace;font-size:10px;
}
.einp:focus{outline:none;border-color:var(--blue)}
.pnlv{font-size:11px;font-weight:700;margin-left:auto}
.pnlv.pos{color:var(--bull)}.pnlv.neg{color:var(--bear)}.pnlv.neu{color:var(--dim)}
.ebtn{padding:3px 7px;font-size:8px;border-radius:var(--r);
  border:1px solid var(--b2);background:var(--bg3);color:var(--dim);cursor:pointer;
  font-family:'JetBrains Mono',monospace}
.ebtn:hover{color:var(--txt)}

/* legs collapse */
.lhdr{
  padding:5px 10px;display:flex;justify-content:space-between;align-items:center;
  cursor:pointer;background:var(--bg3);border-top:1px solid var(--b1);
}
.lhdr:hover{background:var(--bg4)}
.lhdr span:first-child{color:var(--dim);font-size:8.5px;letter-spacing:.5px}
.lhdr span:last-child{color:var(--dim);font-size:8.5px}
.lbody{display:none;padding:4px 8px 8px}
.ltbl{width:100%;border-collapse:collapse;font-size:9.5px}
.ltbl th{color:var(--dim);padding:3px 5px;text-align:left;font-weight:400;
  border-bottom:1px solid var(--b1);background:var(--bg)}
.ltbl td{padding:3px 5px;border-bottom:1px solid rgba(26,42,56,.4)}
.sell{color:var(--bear);font-weight:700}.buy{color:var(--bull);font-weight:700}
.sinp{
  width:74px;padding:2px 5px;background:var(--bg);border:1px solid var(--b1);
  color:var(--cyan);border-radius:2px;font-family:'JetBrains Mono',monospace;font-size:9.5px;
  text-align:right;
}
.sinp:focus{outline:none;border-color:var(--blue)}

/* live panel */
.lpanel{background:var(--bg);border-bottom:1px solid var(--b1)}
.lphdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:4px 10px;background:var(--bg3);border-bottom:1px solid var(--b1);
  font-size:9px;
}
.lptitle{color:var(--cyan);font-weight:700;letter-spacing:1px}
.lpnet{
  font-family:'Orbitron',monospace;font-size:16px;font-weight:700;
  text-align:center;padding:6px 0 2px;
}
.lltbl{width:100%;border-collapse:collapse;font-size:9.5px}
.lltbl th{color:var(--dim);padding:2px 8px;font-weight:400;
  border-bottom:1px solid var(--b1);background:var(--bg)}
.lltbl td{padding:2px 8px;border-bottom:1px solid rgba(26,42,56,.4)}

/* ══ SUMMARY ════════════════════════════════════════════════════ */
#summaryWrap{
  display:none;flex:1;overflow-y:auto;padding:8px;
  padding-bottom:calc(var(--sb)+8px);
}
.sumhdr{
  display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap;
}
.sumtitle{font-family:'Orbitron',monospace;font-size:12px;font-weight:700;
  color:var(--hi);letter-spacing:2px}
.sumgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:6px}
.scard{
  background:var(--bg2);border:1px solid var(--b1);border-radius:6px;
  overflow:hidden;cursor:pointer;transition:border-color .15s;
}
.scard:hover{border-color:var(--b2)}
.sctop{
  background:var(--bg3);border-bottom:1px solid var(--b1);
  padding:5px 9px;display:flex;justify-content:space-between;align-items:center;
}
.scn{font-size:9px;font-weight:700;letter-spacing:.5px}
.scbody{padding:7px 9px}
.scnet{font-family:'Orbitron',monospace;font-size:14px;font-weight:700}
.sclegs{color:var(--dim);font-size:8px;margin-top:3px;line-height:1.5}
.spark{display:flex;align-items:flex-end;gap:1px;height:22px;margin-top:5px}
.spark span{flex:1;min-width:2px;border-radius:1px 1px 0 0;opacity:.7}

/* ══ STATUS BAR ═════════════════════════════════════════════════ */
.sbar-foot{
  height:var(--sb);flex-shrink:0;
  background:var(--bg);border-top:1px solid var(--b1);
  display:flex;align-items:center;padding:0 12px;gap:16px;position:fixed;bottom:0;left:0;right:0;
}
.sbi{font-size:9px;color:var(--dim)}
.sbi span{color:var(--txt)}
.sbi .ok{color:var(--bull)}.sbi .err{color:var(--bear)}.sbi .warn{color:var(--warn)}
.sbt{margin-left:auto;font-size:9px;color:var(--dim)}

/* ══ UTILITY ════════════════════════════════════════════════════ */
.btn{
  padding:4px 10px;font-size:9px;border-radius:var(--r);cursor:pointer;border:1px solid;
  font-family:'JetBrains Mono',monospace;transition:all .15s;
}
.btn:hover{filter:brightness(1.15)}
.btn-g{background:var(--bull2);border-color:var(--bull);color:#b0f0c8}
.btn-b{background:var(--blue2);border-color:var(--blue);color:#b0d8f0}
.btn-d{background:var(--bg3);border-color:var(--b2);color:var(--dim)}
.btn-gold{background:#1c2a08;border-color:var(--hi);color:var(--hi)}
.card-note{padding:3px 10px;font-size:8.5px;color:var(--warn);
  background:rgba(232,146,42,.07);border-bottom:1px solid rgba(232,146,42,.2)}
</style>
</head>
<body>

<!-- ═══ AUTH ══════════════════════════════════════════════════ -->
<div id="authWrap">
<div class="abox">
  <div class="atitle">⚡ JADE SUPREMA</div>
  <div class="asub">SPREAD PREMIUM TRACKER · v16</div>

  <div id="savedBadge" class="saved-badge">✓ Credentials saved — token valid for today</div>

  <!-- STEP 1 -->
  <div class="step-hdr"><div class="step-num">1</div>CLOUDFLARE WORKER URL</div>
  <div class="frow">
    <label>Your Worker URL (from Cloudflare deploy)</label>
    <input id="a_worker" class="finp" type="url" placeholder="https://jade-kite.YOUR_NAME.workers.dev">
  </div>

  <!-- STEP 2 -->
  <div class="adiv"></div>
  <div class="step-hdr"><div class="step-num">2</div>KITE CONNECT CREDENTIALS</div>
  <div class="frow">
    <label>API Key</label>
    <input id="a_key" class="finp" type="text" placeholder="your_api_key" autocomplete="off">
  </div>
  <div class="frow">
    <label>API Secret</label>
    <input id="a_sec" class="finp" type="password" placeholder="your_api_secret">
  </div>

  <!-- STEP 3 -->
  <div class="adiv"></div>

async function sha256hex(str){
  const buf=new TextEncoder().encode(str);
  const h=await crypto.subtle.digest('SHA-256',buf);
  return Array.from(new Uint8Array(h)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function exchangeToken(){
  const wk=$('a_worker').value.trim().replace(/\/$/,'');
  const key=$('a_key').value.trim();
  const sec=$('a_sec').value.trim();
  const rt=$('a_rt').value.trim();
  if(!wk||!key||!sec||!rt){amsg('Fill all fields + request token','err');return}
  amsg('Exchanging token via Cloudflare worker…','inf');
  try{
    // Use the worker's dedicated /token route (not the generic /kite/ proxy)
    // The worker computes the SHA256 checksum server-side for this route
    const r=await fetch(wk+'/token',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({request_token:rt,api_key:key,api_secret:sec})
    });
    const d=await r.json();
    if(!d.data?.access_token)throw new Error(d.message||JSON.stringify(d));
    const tok=d.data.access_token;
    S.workerUrl=wk; S.apiKey=key; S.apiSecret=sec; S.accessToken=tok;
    const todayIST=new Date().toLocaleDateString('en-CA',{timeZone:'Asia/Kolkata'});
    localStorage.setItem('jade',JSON.stringify({wk,key,sec,tok,date:todayIST}));
    const tb=$('tokenBox');
    tb.textContent='ACCESS TOKEN: '+tok.slice(0,16)+'…  (tap to copy)';
    tb.style.display='block';
    $('btnLaunch').style.display='block';
    amsg('✓ Access token generated. Ready to launch!','ok');
  }catch(e){amsg('Error: '+e.message,'err')}
}

async function kite(path,params={}){
  const qs=new URLSearchParams(params).toString();
  const url=`${S.workerUrl}/kite/${path}${qs?'?'+qs:''}`;
  const r=await fetch(url,{headers:{
    'Authorization':`token ${S.apiKey}:${S.accessToken}`,
    'X-Kite-Version':'3'
  }});
  if(!r.ok){const t=await r.text();throw new Error(r.status+': '+t.slice(0,200))}
  return r.json();
}

async function kitePost(path,body){
  const r=await fetch(`${S.workerUrl}/kite/${path}`,{
    method:'POST',
    headers:{
      'Authorization':`token ${S.apiKey}:${S.accessToken}`,
      'X-Kite-Version':'3',
      'Content-Type':'application/x-www-form-urlencoded'
    },
    body
  });
  if(!r.ok){const t=await r.text();throw new Error(r.status+': '+t.slice(0,200))}
  return r.json();
}

// RFC-4180 compliant CSV parser — handles Kite's quoted fields with embedded commas
function parseCSV(text){
  const rows=[];
  let cur=[],field='',inQ=false;
  const pushField=()=>{cur.push(field.trim());field='';};
  for(let i=0;i<text.length;i++){
    const ch=text[i],nx=text[i+1];
    if(inQ){
      if(ch==='"'&&nx==='"'){field+='"';i++;}
      else if(ch==='"'){inQ=false;}
      else field+=ch;
    }else{
      if(ch==='"'){inQ=true;}
      else if(ch===','){pushField();}
      else if(ch==='\r'||ch==='\n'){
        pushField();
        if(ch==='\r'&&nx==='\n')i++;
        if(cur.some(Boolean))rows.push(cur);
        cur=[];
      }else field+=ch;
    }
  }
  pushField();
  if(cur.some(Boolean))rows.push(cur);
  if(!rows.length)return[];
  const hdrs=rows[0];
  return rows.slice(1).map(v=>{
    const o={};hdrs.forEach((h,i)=>o[h]=(v[i]||'').trim());
    return o;
  });
}

async function loadInstruments(){
  setSb('sbApi','Loading…','warn');
  try{
    const r=await fetch(`${S.workerUrl}/kite/instruments/NFO`,{
      headers:{'Authorization':`token ${S.apiKey}:${S.accessToken}`,'X-Kite-Version':'3'}
    });
    // ▶ FIX: check HTTP status before parsing — 401/403 gives JSON error, not CSV
    if(!r.ok){
      const errText=await r.text();
      let errMsg='';
      try{const j=JSON.parse(errText);errMsg=j.message||j.error_type||errText.slice(0,200);}
      catch(_){errMsg=errText.slice(0,200);}
      throw new Error(`HTTP ${r.status}: ${errMsg}`);
    }
    const text=await r.text();
    if(!text||text.trim().startsWith('{'))throw new Error('Expected CSV, got JSON: '+text.slice(0,200));
    const all=parseCSV(text);
    // ▶ FIX: normalise expiry key — Kite CSV expiry format is YYYY-MM-DD; trim any whitespace
    const nifty=all.filter(i=>i.name==='NIFTY'&&(i.instrument_type==='CE'||i.instrument_type==='PE'));
    if(!nifty.length)throw new Error('0 NIFTY options found in CSV. Check auth token.');
    S.instruments=nifty;
    S.instrMap={};
    const exSet=new Set();
    nifty.forEach(i=>{
      // ▶ FIX: normalise expiry to trim whitespace; normalise strike to integer string
      const expNorm=(i.expiry||'').trim();
      const strikeNorm=Math.round(parseFloat(i.strike));
      const k=`NIFTY_${i.instrument_type}_${strikeNorm}_${expNorm}`;
      S.instrMap[k]={token:(i.instrument_token||'').trim(),sym:i.tradingsymbol,lot:parseInt(i.lot_size)||25};
      if(expNorm)exSet.add(expNorm);
    });
    S.expiries=[...exSet].sort();
    const today=new Date().toLocaleDateString('en-CA',{timeZone:'Asia/Kolkata'});
    const nxt=S.expiries.find(e=>e>=today)||S.expiries[0];
    const far=S.expiries.find(e=>e>nxt)||S.expiries[1]||nxt;
    ['sel_exp','sel_far'].forEach((id,i)=>{
      const arr=S.expiries, def=i===0?nxt:far;
      $(id).innerHTML=arr.map(e=>`<option value="${e}"${e===def?' selected':''}>${e}</option>`).join('');
    });
    S.expiry=nxt; S.farExpiry=far;
    $('hExp').textContent=nxt.slice(5);
    $('hDte').textContent=calcDTE(nxt)+'d';
    setSb('sbApi','✓ Connected','ok');
    setSb('sbInst',nifty.length+' opts');
    set50dte();
    return true;
  }catch(e){
    setSb('sbApi',e.message.slice(0,60),'err');
    console.error('loadInstruments failed:',e);
    return false;
  }
}

function getToken(type,strike,expiry){
  // ▶ FIX: normalise both sides of the lookup — trim expiry, round strike
  const k=`NIFTY_${type}_${Math.round(strike)}_${(expiry||'').trim()}`;
  return S.instrMap[k]||null;
}

// HISTORICAL DATA
// ═══════════════════════════════════════════════════════════════
const histCache={};

function kiteTs(ts){
  // Kite returns "2024-01-15T09:15:00+0530" — the +0530 (no colon) is non-standard.
  // Safari/Firefox return NaN for it. Normalise to RFC 3339 "+05:30" before parsing.
  const norm=typeof ts==='string'
    ? ts.replace(/([+-]\d{2})(\d{2})$/,'$1:$2')  // +0530 → +05:30
    : ts;
  return Math.floor(new Date(norm).getTime()/1000);
}

async function fetchHist(token,interval,from,to){
  const k=`${token}_${interval}_${from}_${to}`;
  if(histCache[k])return histCache[k];
  try{
    const d=await kite(`instruments/historical/${token}/${interval}`,{
      from:from+' 09:00:00',to:to+' 15:35:00',continuous:0,oi:1
    });
    const candles=d?.data?.candles||[];
    histCache[k]=candles;
    return candles;
  }catch(e){console.warn('hist fail',token,e.message);return[]}
}

function combineOHLC(legCandles,signs){
  const tsMap=new Map();
  for(let i=0;i<legCandles.length;i++){
    legCandles[i].forEach(c=>{
      const ts=kiteTs(c[0]);
      if(!tsMap.has(ts))tsMap.set(ts,new Array(legCandles.length).fill(null));
      tsMap.get(ts)[i]=c;
    });
  }
  const out=[];
  const sorted=[...tsMap.entries()].sort((a,b)=>a[0]-b[0]);
  for(const [ts,bars]of sorted){
    if(bars.some(b=>!b))continue;
    let o=0,h=0,l=0,c=0;
    for(let i=0;i<bars.length;i++){
      const[,bo,bh,bl,bc]=bars[i];
      const s=signs[i];
      o+=bo*s; c+=bc*s;
      h+=s>0?bh*s:bl*Math.abs(s);
      l+=s>0?bl*s:bh*Math.abs(s);
    }
    out.push({time:ts,open:Math.round(o*10)/10,high:Math.round(h*10)/10,
              low:Math.round(l*10)/10,close:Math.round(c*10)/10});
  }
  return out;
}

function set50dte(){

  const expDt=new Date(exp+'T00:00:00+05:30');
  const from=new Date(expDt); from.setDate(from.getDate()-50);
  const to=new Date(Math.min(expDt,new Date()));
  $('inp_from').value=from.toLocaleDateString('en-CA',{timeZone:'Asia/Kolkata'});
  $('inp_to').value=to.toLocaleDateString('en-CA',{timeZone:'Asia/Kolkata'});
  S.from=$('inp_from').value; S.to=$('inp_to').value;
}

function calcDTE(expiry){
  if(!expiry)return null;
  const exp=new Date(expiry+'T15:30:00+05:30');
  return Math.max(0,Math.round((exp-Date.now())/(864e5)));
}
function dteBadge(expiry){
  const d=calcDTE(expiry);
  if(d===null)return'';
  const cls=d>21?'ok':d>7?'w':'x';
  return`<span class="bdg bdg-dte-${cls}">⏱ ${d}d</span>`;
}

    if(expiry&&from&&to)loadData(id);
  }));
}

function clearCache(id){
  delete S.data[id];
  // ▶ FIX: actually remove all histCache entries whose key starts with any token for this spread
  const sp=SP.find(s=>s.id===id);if(!sp)return;
  const dir=S.dirs[id]||'bear';
  const legs=sp.legs(S.cmp,getOff(),dir);
  const exp=$('sel_exp').value,far=$('sel_far').value;
  legs.forEach((_,i)=>{
    const inpEl=$(`str_${id}_${i}`);
    if(!inpEl)return;
    const strike=parseFloat(inpEl.value)||legs[i].k;
    const useExp=legs[i].far?far:exp;
    const instr=getToken(legs[i].t,strike,useExp);
    if(instr){
      Object.keys(histCache).forEach(k=>{if(k.startsWith(instr.token+'_'))delete histCache[k];});
    }
  });
}

// ═══════════════════════════════════════════════════════════════
// LOAD DATA
// ═══════════════════════════════════════════════════════════════
async function loadData(spId){
  const sp=SP.find(s=>s.id===spId);
  if(!sp)return;
  const dir=S.dirs[spId]||'bear';
  const cmp=S.cmp, o=getOff();
  const legs=sp.legs(cmp,o,dir);
  const expiry=$('sel_exp').value;
  const farExp=$('sel_far').value;
  const interval=$('sel_tf').value;
  const from=$('inp_from').value;
  const to=$('inp_to').value;
  if(!expiry||!from||!to){showErr(spId,'⚠ Set expiry and date range first');return}

  showVeil(spId,true);
  setSb('sbData',`Loading ${sp.name}…`);

  try{
    const toks=[]; const signs=[]; const miss=[];
    for(let i=0;i<legs.length;i++){
      const leg=legs[i];
      const useExp=leg.far?farExp:expiry;
      const inpEl=$(`str_${spId}_${i}`);
      const strike=inpEl?parseFloat(inpEl.value)||leg.k:leg.k;
      const instr=getToken(leg.t,strike,useExp);
      if(!instr){miss.push(`${leg.t} ${strike} (${useExp})`);continue}
      toks.push(instr.token);
      signs.push((leg.a==='S'?1:-1)*leg.q);
    }

    if(!toks.length){
      showErr(spId,`⚠ No strikes found:\n${miss.join(', ')}\nAdjust CMP / offsets to match listed strikes.`);
      showVeil(spId,false);return;
    }

    // fetch with small delay to avoid rate limits
    const candles=[];
    for(const tok of toks){
      const c=await fetchHist(tok,interval,from,to);
      candles.push(c);
      await new Promise(r=>setTimeout(r,120));
    }

    if(candles.every(c=>c.length===0)){
      showErr(spId,'⚠ No data returned.\nCheck: date range, expiry, timeframe.\nIntraday: Kite only provides ~60 days.');
      showVeil(spId,false);return;
    }

    const ohlc=combineOHLC(candles,signs);
    if(!ohlc.length){
      showErr(spId,'⚠ Could not align timestamps across legs.\nTry Daily timeframe.');
      showVeil(spId,false);return;
    }

    S.data[spId]=ohlc;
    const ch=S.charts[spId];
    if(!ch){showVeil(spId,false);return}

    ch.cs.setData(ohlc);
    ch.prem.timeScale().fitContent();

    // auto-set entry to first bar close
    const entEl=$(`entry_${spId}`);
    if(entEl&&(!entEl.value||entEl.value==='0')){
      entEl.value=ohlc[0].close.toFixed(1);
    }

    // data range label
    const d1=new Date(ohlc[0].time*1000).toLocaleDateString('en-IN',{timeZone:'Asia/Kolkata',day:'2-digit',month:'short'});
    const d2=new Date(ohlc[ohlc.length-1].time*1000).toLocaleDateString('en-IN',{timeZone:'Asia/Kolkata',day:'2-digit',month:'short'});
    const drEl=$(`dr_${spId}`);
    if(drEl)drEl.textContent=`${d1}→${d2} (${ohlc.length} bars)`;
    const bcEl=$(`barcnt_${spId}`);
    if(bcEl)bcEl.textContent=ohlc.length+' bars';

    renderOverlays(spId);
    setSb('sbData',`${sp.name}: ${ohlc.length} bars`,'ok');
    if(miss.length){
      const n=$(`card_${spId}`)?.querySelector('.card-note');
      if(n)n.textContent=`⚠ Missing: ${miss.join(', ')} — omitted`;
    }
  }catch(e){
    showErr(spId,'Error: '+e.message);
    setSb('sbData','Load error','err');
  }
  showVeil(spId,false);
}

// ═══════════════════════════════════════════════════════════════
// OVERLAYS (entry line, decay, TP50, 18-DTE marker, P&L)
// ═══════════════════════════════════════════════════════════════
function renderOverlays(spId){
  const sp=SP.find(s=>s.id===spId);
  const ch=S.charts[spId];
  const ohlc=S.data[spId];
  if(!ch||!ohlc||!ohlc.length)return;

  const entryVal=parseFloat($(`entry_${spId}`)?.value);
  if(isNaN(entryVal))return;

  const expiry=$('sel_exp').value||'';

  // Entry flat line
  ch.el.setData(ohlc.map(c=>({time:c.time,value:entryVal})));

  // Theoretical sqrt-time decay
  const expTs=expiry?new Date(expiry+'T15:30:00+05:30').getTime()/1000:null;
  const entTs=ohlc[0].time;
  if(expTs){
    const totalSec=Math.max(expTs-entTs,1);
    const theo=ohlc.map(c=>{
      const rem=Math.max(expTs-c.time,0);
      const fracLeft=rem/totalSec;
      return{time:c.time,value:Math.round(entryVal*Math.sqrt(fracLeft)*10)/10};
    });
    ch.dl.setData(theo);
  }

  // TP50% line
  const tp50=sp.type==='debit'?entryVal*1.5:entryVal*0.5;
  ch.tl.setData(ohlc.map(c=>({time:c.time,value:tp50})));

  // 18-DTE exit marker (vertical via price range)
  if(expiry){
    const exitTs=new Date(expiry+'T15:30:00+05:30').getTime()/1000 - 18*86400;
    const near=ohlc.reduce((b,c)=>Math.abs(c.time-exitTs)<Math.abs(b.time-exitTs)?c:b,ohlc[0]);
    if(near){
      const mn=Math.min(...ohlc.map(c=>c.low));
      const mx=Math.max(...ohlc.map(c=>c.high));
      ch.xl.setData([{time:near.time,value:mn},{time:near.time,value:mx}]);
    }
  }

  // P&L
  const pnlData=ohlc.map(c=>{
    const pnl=sp.type==='debit'?c.close-entryVal:entryVal-c.close;
    return{time:c.time,value:Math.round(pnl*10)/10};
  });
  ch.ps.setData(pnlData);
  ch.zl.setData(ohlc.map(c=>({time:c.time,value:0})));
  ch.pnl.timeScale().fitContent();

  // Stats bar
  const last=ohlc[ohlc.length-1];
  const lastPnl=sp.type==='debit'?last.close-entryVal:entryVal-last.close;
  const decPct=entryVal?Math.round((1-last.close/entryVal)*100):0;
  const dte=calcDTE(expiry);

  setStat(spId,'en',entryVal.toFixed(1),'hi');
  setStat(spId,'lv',last.close.toFixed(1),'live');
  setStat(spId,'pl',(lastPnl>=0?'+':'')+lastPnl.toFixed(0),lastPnl>0?'pos':'neg');
  setStat(spId,'dc',decPct+'%',decPct>=50?'pos':decPct>=20?'live':'neu');
  setStat(spId,'dt',dte!=null?dte+'d':'—',dte!=null&&dte<=18?'neg':dte!=null&&dte<=21?'warn':'hi');

  // header P&L display
  const pv=$(`pnlv_${spId}`);
  if(pv){
    pv.textContent=`P&L: ${lastPnl>=0?'+':''}${lastPnl.toFixed(0)}`;
    pv.className='pnlv '+(lastPnl>0?'pos':lastPnl<0?'neg':'neu');
  }
}

  const e=$(`sv_${key}_${id}`);
  if(e){e.textContent=val;e.className='sv '+cls}
}

// ═══════════════════════════════════════════════════════════════
// LIVE QUOTES
// ═══════════════════════════════════════════════════════════════
async function fetchQuotes(spIds){
  const tokToInfo=new Map();
  for(const spId of spIds){
    const sp=SP.find(s=>s.id===spId);if(!sp)continue;
    const dir=S.dirs[spId]||'bear';
    const legs=sp.legs(S.cmp,getOff(),dir);
    const exp=$('sel_exp').value, far=$('sel_far').value;
    for(let i=0;i<legs.length;i++){
      const leg=legs[i];
      const useExp=leg.far?far:exp;
      const inpEl=$(`str_${spId}_${i}`);
      const strike=inpEl?parseFloat(inpEl.value)||leg.k:leg.k;
      const instr=getToken(leg.t,strike,useExp);if(!instr)continue;
      const tok=String(instr.token);
      if(!tokToInfo.has(tok))tokToInfo.set(tok,[]);
      tokToInfo.get(tok).push({spId,legIdx:i,sign:(leg.a==='S'?1:-1)*leg.q,leg});
    }
  }
  if(!tokToInfo.size)return;

  // ▶ FIX: Kite /quote API uses NFO:TRADINGSYMBOL, not numeric token
  // Rebuild map keyed by tradingsymbol for quote lookup
  const symToInfo=new Map();
  for(const[tok,infos]of tokToInfo){
    // tok here is the numeric instrument_token; get the sym from instrMap
    let sym=tok;
    for(const[k,v]of Object.entries(S.instrMap)){if(String(v.token)===tok){sym=v.sym;break;}}
    if(!symToInfo.has(sym))symToInfo.set(sym,[]);
    for(const info of infos)symToInfo.get(sym).push(info);
  }

  const syms=[...symToInfo.keys()];
  const qmap={};
  // batch 400 symbols at a time
  for(let i=0;i<syms.length;i+=400){
    const chunk=syms.slice(i,i+400);
    try{
      const params=chunk.map(s=>`i=NFO:${encodeURIComponent(s)}`).join('&');
      const r=await fetch(`${S.workerUrl}/kite/quote?${params}`,{
        headers:{'Authorization':`token ${S.apiKey}:${S.accessToken}`,'X-Kite-Version':'3'}
      });
      if(!r.ok){console.warn('quote HTTP error',r.status);continue;}
      const d=await r.json();
      Object.assign(qmap,d.data||{});
    }catch(e){console.warn('quote err',e.message)}
  }

  const acc={};
  for(const id of spIds)acc[id]={net:0,legs:[],ok:true};

  // ▶ FIX: iterate symToInfo (keyed by tradingsymbol) to match qmap keys
  for(const[sym,infos]of symToInfo){
    const q=qmap[`NFO:${sym}`];
    for(const info of infos){
      const ltp=q?.last_price??null;
      const prev=q?.ohlc?.close??ltp;
      if(ltp===null){acc[info.spId].ok=false;continue}
      const contrib=ltp*info.sign;
      acc[info.spId].net+=contrib;
      acc[info.spId].legs[info.legIdx]={ltp,prev,sign:info.sign,
        label:info.leg.lb||`${info.leg.t}${info.leg.k}`,
        type:info.leg.t,action:info.leg.a,strike:info.leg.k,qty:info.leg.q};
    }
  }

  for(const spId of spIds){
    const a=acc[spId];
    const net=Math.round(a.net*100)/100;
    S.liveQ[spId]={net,legs:a.legs,ts:Date.now(),ok:a.ok};
    updateLivePanel(spId);
    updateSumCard(spId);
    appendLive(spId,net);
  }
  setSb('sbData','Live: '+new Date().toLocaleTimeString('en-IN',{timeZone:'Asia/Kolkata'}),'ok');
}

function updateLivePanel(spId){
  const panel=$(`lp_${spId}`);if(!panel)return;
  const q=S.liveQ[spId];if(!q)return;
  const sp=SP.find(s=>s.id===spId);
  const entry=parseFloat($(`entry_${spId}`)?.value);
  const net=q.net;
  const netCls=net>0?'pos':net<0?'neg':'neu';

  const pnl=isNaN(entry)?null:(sp?.type==='debit'?net-entry:entry-net);
  const pv=$(`pnlv_${spId}`);
  if(pv&&pnl!==null){
    pv.textContent=`P&L: ${pnl>=0?'+':''}${pnl.toFixed(0)}`;
    pv.className='pnlv '+(pnl>0?'pos':pnl<0?'neg':'neu');
  }

  const legRows=(q.legs||[]).map(leg=>{
    if(!leg)return'';
    const pct=leg.prev?((leg.ltp-leg.prev)/leg.prev*100).toFixed(1):'—';
    const chgCls=parseFloat(pct)>=0?'var(--bull)':'var(--bear)';
    const contribCls=leg.ltp*leg.sign>=0?'var(--bull)':'var(--bear)';
    return`<tr>
      <td style="color:${leg.action==='S'?'var(--bear)':'var(--bull)'}">
        ${leg.action==='S'?'▼':'▲'} ${leg.type}</td>
      <td style="color:var(--cyan)">${leg.strike}</td>
      <td>${leg.qty}×</td>
      <td style="font-weight:600">${leg.ltp?.toFixed(2)??'—'}</td>
      <td style="color:${contribCls};font-weight:700">${(leg.ltp*leg.sign>=0?'+':'')+(leg.ltp*leg.sign).toFixed(1)}</td>
      <td style="color:${chgCls}">${pct}%</td>
    </tr>`;
  }).join('');

  panel.innerHTML=`
    <div class="lphdr">
      <span class="lptitle">⚡ LIVE NET</span>
      ${pnl!==null?`<span style="font-size:9px;font-weight:700;color:${pnl>=0?'var(--bull)':'var(--bear)'}">${pnl>=0?'+':''}${pnl.toFixed(0)} P&L</span>`:''}
      <span style="color:var(--dim);font-size:8px;margin-left:auto">${new Date(q.ts).toLocaleTimeString('en-IN',{timeZone:'Asia/Kolkata'})}</span>
    </div>
    <div class="lpnet ${netCls}">${net>=0?'+':''}${net.toFixed(2)} pts</div>
    <table class="lltbl">
      <thead><tr>
        <th>Leg</th><th>Strike</th><th>Qty</th><th>LTP</th><th>Contrib</th><th>Chg%</th>
      </tr></thead>
      <tbody>${legRows}</tbody>
    </table>`;

  // stats live update
  setStat(spId,'lv',net.toFixed(1),'live');
  if(!isNaN(entry)&&pnl!==null){
    setStat(spId,'pl',(pnl>=0?'+':'')+pnl.toFixed(0),pnl>0?'pos':'neg');
  }
}

function appendLive(spId,net){
  const ch=S.charts[spId];if(!ch)return;
  const ts=Math.floor(Date.now()/1000);
  try{ch.cs.update({time:ts,open:net,high:net,low:net,close:net})}catch(_){}
  const entry=parseFloat($(`entry_${spId}`)?.value);
  const sp=SP.find(s=>s.id===spId);
  if(!isNaN(entry)&&sp){
    const pnl=sp.type==='debit'?net-entry:entry-net;
    try{ch.ps.update({time:ts,value:Math.round(pnl*10)/10})}catch(_){}
  }
}

    $('btnAuto').className='btn btn-d';
    const iv=parseInt($('sel_ri').value)||30;

const LC={l0:'var(--cyan)',l1:'var(--blue)',l2:'var(--warn)',
           l3:'var(--purp)',l4:'var(--bull)',tor:'var(--hi)',spl:'var(--bear)'};

function buildSumGrid(){
  const g=$('sumgrid');
  g.innerHTML=SP.map(sp=>{
    const q=S.liveQ[sp.id];
    const dir=S.dirs[sp.id]||'bear';
    const legs=sp.legs(S.cmp,getOff(),dir);
    const legStr=legs.map(l=>`${l.a==='S'?'▼':'▲'}${l.t}${l.k}`).join(' · ');
    const col=LC[sp.lay]||'var(--dim)';
    const net=q?q.net:null;
    const nc=net===null?'var(--dim)':net>=0?'var(--bull)':'var(--bear)';
    const hist=S.data[sp.id]||[];
    const spark=hist.length>0?buildSpark(hist.map(c=>c.close),col):'';
    return`<div class="scard" id="sc_${sp.id}" onclick="goToSpread(${sp.pg})">
      <div class="sctop">
        <span class="scn" style="color:${col}">${sp.name}</span>
        <span style="color:var(--dim);font-size:8px">${sp.lay.toUpperCase()}</span>
      </div>
      <div class="scbody">
        <div class="scnet" id="scnet_${sp.id}" style="color:${nc}">${net!==null?(net>=0?'+':'')+net.toFixed(1):'—'}</div>
        <div class="sclegs">${legStr}</div>
        ${spark?`<div class="spark">${spark}</div>`:''}
      </div>
    </div>`;
  }).join('');
}

function updateSumCard(spId){
  const el=$(`scnet_${spId}`);if(!el)return;
  const q=S.liveQ[spId];if(!q)return;
  const net=q.net;
  el.textContent=(net>=0?'+':'')+net.toFixed(1);
  el.style.color=net>=0?'var(--bull)':'var(--bear)';
}

function goToSpread(pg){toggleSummary();goPage(pg)}

function buildSpark(vals,col){
  if(!vals.length)return'';
  const mn=Math.min(...vals),mx=Math.max(...vals),rng=mx-mn||1;
  return vals.slice(-36).map(v=>{
    const h=Math.max(2,Math.round(((v-mn)/rng)*22));
    const c=v>=(mn+rng/2)?col:'var(--bear)';
    return`<span style="height:${h}px;background:${c}"></span>`;
  }).join('');
}

async function loadPage(){
  S.from=$('inp_from').value; S.to=$('inp_to').value;
  S.expiry=$('sel_exp').value; S.farExpiry=$('sel_far').value;
  const spreads=SP.filter(s=>s.pg===S.page);
  for(const sp of spreads)await loadData(sp.id);
}

// ═══════════════════════════════════════════════════════════════
// UI HELPERS
// ═══════════════════════════════════════════════════════════════
function showVeil(id,on){
  const box=$(`cbox_${id}`);if(!box)return;
  let v=box.querySelector('.veil');
  if(on){
    if(!v){v=document.createElement('div');v.className='veil';
      v.innerHTML='<div class="vspin"></div><div class="vtxt">Fetching Kite data…</div>';
      box.appendChild(v)}
  }else{v?.remove()}
}

function showErr(id,msg){
  const e=$(`cprem_${id}`);
  if(e)e.innerHTML=`<div class="verr">${msg.replace(/\n/g,'<br>')}</div>`;
}

function setSb(id,txt,cls=''){
  const e=$(id);if(!e)return;
  e.innerHTML=`<span class="${cls}">${txt}</span>`;
}

// ═══════════════════════════════════════════════════════════════
// CLOCK
// ═══════════════════════════════════════════════════════════════
setInterval(()=>{
  $('sbTime').textContent=new Date().toLocaleTimeString('en-IN',{timeZone:'Asia/Kolkata'})+' IST';
},1000);

// ═══════════════════════════════════════════════════════════════
// INIT — check saved credentials
// ═══════════════════════════════════════════════════════════════
(function init(){
  try{
    const saved=JSON.parse(localStorage.getItem('jade')||'{}');
    const todayIST=new Date().toLocaleDateString('en-CA',{timeZone:'Asia/Kolkata'});
    if(saved.tok&&saved.date===todayIST&&saved.wk&&saved.key&&saved.sec){
      S.workerUrl=saved.wk; S.apiKey=saved.key;
      S.apiSecret=saved.sec; S.accessToken=saved.tok;
      $('a_worker').value=saved.wk;
      $('a_key').value=saved.key;
      $('a_sec').value=saved.sec;
      $('savedBadge').style.display='block';
      $('btnLaunch').style.display='block';
      amsg('✓ Token valid for today. Tap Launch!','ok');
    }
  }catch(_){}

  // Set default dates
  const today=new Date();
  const from50=new Date(today);from50.setDate(from50.getDate()-50);
  $('inp_from').value=from50.toLocaleDateString('en-CA',{timeZone:'Asia/Kolkata'});
  $('inp_to').value=today.toLocaleDateString('en-CA',{timeZone:'Asia/Kolkata'});
})();
</script>
